name: image_pipeline
description: A Dart package for image processing.
version: 0.0.1
homepage: https://mattiapispisa.github.io/
repository: https://github.com/MattiaPispisa/image_pipeline
topics: [image, processing, pipeline]

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  code_assets: ^1.0.0
  hooks: ^1.0.0
  en_logger: ^1.3.0
  http: ^1.0.0
  native_toolchain_c: 
  ffi: ^2.1.0

dev_dependencies:
  coverage: ^1.15.0
  ffigen: ^10.0.0
  mocktail: ^1.0.5
  path: 
  test: 
  archive:
  
ffigen:
  name: VipsBindings
  description: Bindings per il wrapper di libvips
  output: 'lib/src/native/io/io_transformer_bindings_generated.dart'

  ffi-native:
    assetId: 'package:image_pipeline/io_transformer'

  headers:
    entry-points:
      - 'native/io/transform.h'
    include-directives:
      - 'native/io/transform.h'